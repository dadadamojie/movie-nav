<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>影视动漫导航</title>
<!-- 国内稳定 CDN -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#121212;color:#e0e0e0;font-family:system-ui,sans-serif;min-height:100vh;padding:20px}
.container{max-width:1000px;margin:0 auto}
h1{text-align:center;margin-bottom:24px;font-size:24px;color:#fff}
.category{margin-bottom:30px}
.category h2{font-size:18px;margin-bottom:12px;color:#ccc;border-left:4px solid #0ea5e9;padding-left:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.card{background:#1e1e1e;border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px;text-decoration:none;color:#e0e0e0;border:1px solid #333}
.card:hover{background:#2a2a2a;border-color:#0ea5e9}
.card .icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:#27272a;border-radius:8px;color:#0ea5e9;font-size:16px}
.card .title{font-size:14px;line-height:1.3}

.tools{margin-bottom:20px}
textarea{width:100%;height:140px;background:#1e1e1e;color:#fff;border:1px solid #333;border-radius:8px;padding:12px;resize:none}
.import-btn{margin-top:10px;padding:10px 16px;background:#0ea5e9;color:#fff;border:none;border-radius:8px;cursor:pointer}
#searchInput{width:100%;padding:12px 16px;background:#1e1e1e;color:#fff;border:1px solid #333;border-radius:8px;margin-bottom:16px;font-size:14px;border:1px solid #0ea5e9;outline:none}
</style>
</head>
<body>
<div class="container">
  <h1>🎬 影视动漫导航</h1>
  
  <!-- 搜索框 -->
  <input type="text" id="searchInput" placeholder="🔍 搜索已导入的影视剧..." oninput="filterCards()">

  <div class="tools">
    <textarea id="batchInput" placeholder='格式（一行一条）：
分类,图标,名称,链接
电影,fa-film,豆瓣电影,https://movie.douban.com
电视剧,fa-tv,豆瓣剧集,https://movie.douban.com/tv
动漫,fa-paper-plane,B站番剧,https://www.bilibili.com/anime
'>
    </textarea>
    <button class="import-btn" onclick="importLinks()">批量导入并生成导航</button>
  </div>

  <div id="content"></div>
</div>

<script>
let allCards = []; // 存储所有卡片用于搜索

function importLinks() {
  const text = document.getElementById('batchInput').value.trim();
  const lines = text.split('\n').filter(l => l.trim());
  const data = { 电影: [], 电视剧: [], 动漫: [] };
  allCards = [];

  lines.forEach(line => {
    const [cat, icon, title, link] = line.split(',');
    if (cat && icon && title && link && data[cat] !== undefined) {
      const item = { cat, icon, title, link };
      data[cat].push(item);
      allCards.push(item);
    }
  });
  
  renderCards(data);
}

function renderCards(data) {
  let html = '';
  for (const cat in data) {
    if(data[cat].length === 0) continue;
    html += `<div class="category"><h2>${cat}</h2><div class="grid">`;
    data[cat].forEach(item => {
      html += `
<a class="card" href="${item.link}" target="_blank" data-title="${item.title.toLowerCase()}">
  <div class="icon"><i class="fa ${item.icon}"></i></div>
  <div class="title">${item.title}</div>
</a>`;
    });
    html += `</div></div>`;
  }
  document.getElementById('content').innerHTML = html;
}

// 搜索过滤函数
function filterCards() {
  const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
  const cards = document.querySelectorAll('.card');
  
  cards.forEach(card => {
    const title = card.dataset.title;
    card.style.display = title.includes(keyword) ? 'flex' : 'none';
  });
  
  // 隐藏空分类
  document.querySelectorAll('.category').forEach(cat => {
     const visible = cat.querySelectorAll('.card[style="display: flex;"]').length;
     cat.style.display = visible > 0 ? 'block' : 'none';
  });
}
</script>
</body>
</html>
