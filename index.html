<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影视导航</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #121212;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #0ea5e9;
        }
        #searchInput {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #0ea5e9;
            border-radius: 25px;
            background-color: #1e1e1e;
            color: #fff;
            font-size: 16px;
            margin-bottom: 30px;
        }
        #searchInput::placeholder {
            color: #aaa;
        }
        .category-section {
            margin-bottom: 40px;
        }
        .category-title {
            font-size: 20px;
            color: #0ea5e9;
            margin-bottom: 15px;
            border-left: 4px solid #0ea5e9;
            padding-left: 10px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        .card {
            background-color: #1e1e1e;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .card:hover {
            background-color: #2d2d2d;
            transform: translateY(-5px);
        }
        .card i {
            font-size: 30px;
            color: #0ea5e9;
            margin-bottom: 10px;
        }
        .card-title {
            font-size: 14px;
            color: #fff;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 影视导航</h1>
        <input type="text" id="searchInput" placeholder="🔍 搜索影视...">
        <div id="content"></div>
    </div>

    <script>
        // ==============================================
        // 🔥 在这里添加你的所有影视链接（以后加内容只改这里）
        // 格式：["分类","图标","名称","链接"]
        // ==============================================
        const movieData = [
            ["电视剧","fa-television","重案解密","https://pan.quark.cn/s/xxxx"],
            ["电视剧","fa-television","狂飙","https://pan.quark.cn/s/xxxx"],
            ["电视剧","fa-television","三体","https://pan.baidu.com/s/xxxx"],
            ["电影","fa-film","流浪地球2","https://pan.quark.cn/s/xxxx"],
            ["电影","fa-film","满江红","https://pan.baidu.com/s/xxxx"],
            ["动漫","fa-play-circle","海贼王","https://pan.quark.cn/s/xxxx"],
            ["动漫","fa-play-circle","火影忍者","https://pan.baidu.com/s/xxxx"],
            ["综艺","fa-smile-o","奔跑吧","https://pan.quark.cn/s/xxxx"],
            ["纪录片","fa-book","地球脉动","https://pan.baidu.com/s/xxxx"]
        ];

        // 初始化渲染
        window.onload = function() {
            renderCards(movieData);
        };

        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            const filtered = movieData.filter(item => item[2].toLowerCase().includes(keyword));
            renderCards(filtered);
        });

        // 渲染卡片
        function renderCards(data) {
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = '';
            const grouped = {};
            data.forEach(item => {
                const cat = item[0];
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(item);
            });
            for (const cat in grouped) {
                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `<h2 class="category-title">${cat}</h2><div class="card-grid" id="grid-${cat}"></div>`;
                contentDiv.appendChild(section);
                const grid = document.getElementById(`grid-${cat}`);
                grouped[cat].forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<i class="fa ${item[1]}"></i><div class="card-title">${item[2]}</div>`;
                    card.onclick = () => window.open(item[3], '_blank');
                    grid.appendChild(card);
                });
            }
        }
    </script>
</body>
</html>
