<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影搜</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #121212;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #0ea5e9;
        }
        #searchInput {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #0ea5e9;
            border-radius: 25px;
            background-color: #1e1e1e;
            color: #fff;
            font-size: 16px;
            margin-bottom: 30px;
        }
        #searchInput::placeholder {
            color: #aaa;
        }
        .category-section {
            margin-bottom: 40px;
        }
        .category-title {
            font-size: 20px;
            color: #0ea5e9;
            margin-bottom: 15px;
            border-left: 4px solid #0ea5e9;
            padding-left: 10px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        .card {
            background-color: #1e1e1e;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .card:hover {
            background-color: #2d2d2d;
            transform: translateY(-5px);
        }
        .card i {
            font-size: 30px;
            color: #0ea5e9;
            margin-bottom: 10px;
        }
        .card-title {
            font-size: 14px;
            color: #fff;
            word-break: break-all;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
        }
        .modal h2 {
            margin-bottom: 20px;
            color: #0ea5e9;
        }
        #importTextarea {
            width: 100%;
            height: 200px;
            background-color: #2d2d2d;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            padding: 10px;
            margin-bottom: 15px;
            resize: none;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .modal-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary {
            background-color: #0ea5e9;
            color: #fff;
        }
        .btn-secondary {
            background-color: #444;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 影搜</h1>
        <input type="text" id="searchInput" placeholder="🔍 搜索影视...">
        <div id="content"></div>
    </div>

    <!-- 导入弹窗 -->
    <div class="modal" id="importModal">
        <div class="modal-content">
            <h2>导入影视链接</h2>
            <textarea id="importTextarea" placeholder="格式：分类,图标,名称,链接&#10;例如：电视剧,fa-television,重案六组,https://xxx"></textarea>
            <div class="modal-buttons">
                <button class="modal-btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="modal-btn btn-primary" onclick="importData()">导入链接</button>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        // 初始化时读取本地存储
        window.onload = function() {
            const stored = localStorage.getItem('movieNavData');
            if (stored) {
                allData = JSON.parse(stored);
                renderCards();
            }
        };

        // 监听 Ctrl+I 打开导入框
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'i') {
                e.preventDefault();
                openModal();
            }
        });

        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            const filtered = allData.filter(item => item.name.toLowerCase().includes(keyword));
            renderCards(filtered);
        });

        function renderCards(data = allData) {
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = '';
            // 按分类分组
            const grouped = {};
            data.forEach(item => {
                if (!grouped[item.category]) {
                    grouped[item.category] = [];
                }
                grouped[item.category].push(item);
            });
            // 生成分类区块
            for (const cat in grouped) {
                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `<h2 class="category-title">${cat}</h2><div class="card-grid" id="grid-${cat}"></div>`;
                contentDiv.appendChild(section);
                const grid = document.getElementById(`grid-${cat}`);
                grouped[cat].forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <i class="fa ${item.icon}"></i>
                        <div class="card-title">${item.name}</div>
                    `;
                    card.onclick = () => window.open(item.url, '_blank');
                    grid.appendChild(card);
                });
            }
        }

        function openModal() {
            document.getElementById('importModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('importModal').style.display = 'none';
            document.getElementById('importTextarea').value = '';
        }

        function importData() {
            const text = document.getElementById('importTextarea').value.trim();
            if (!text) return;
            const lines = text.split('\n');
            lines.forEach(line => {
                const parts = line.split(',');
                if (parts.length >= 4) {
                    const category = parts[0].trim();
                    const icon = parts[1].trim();
                    const name = parts[2].trim();
                    const url = parts[3].trim();
                    allData.push({ category, icon, name, url });
                }
            });
            // 保存到本地存储
            localStorage.setItem('movieNavData', JSON.stringify(allData));
            renderCards();
            closeModal();
            alert('导入成功！');
        }
    </script>
</body>
</html>
